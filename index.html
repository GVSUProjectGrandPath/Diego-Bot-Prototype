<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet">
  <title>Rep4 test</title> 
</head>

<body>

  <div class="top-bar">
    <a class="title" href="https://www.rep4finlit.org/">Rep4 FinLit</a>
    <a class="title" href="https://www.rep4finlit.org/social">Community</a>
    <a class="title" href="https://quiz.rep4finlit.org/">Quiz</a>
    <a class="title" href="https://www.rep4finlit.org/about">About</a>
    <a class="title" href="">Contact</a>
  </div>

  <div class="side-bar">
    <div class="big-bot-refresh-btn">⟳</div>
    <div class="side-bar-close-btn">X</div>
    <br>
    <img src="rep4finlitlogo.png" alt="logo" style="width: 100%; margin-top: 2.5vw; margin-bottom: 3vh;">
    <button class="budget-btn">Build a Budget</button>
    <button class="purchase-btn">Plan for a Purchase</button>
    <button class="loan-btn">Calculate a Loan</button>
    <button class="credit-btn">Check my Credit Score</button>
    <button class="fun-btn">Fun FinLit Fact</button>
  </div>
  <div class="side-bar-open">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <main>
    <div class="big-bot-refresh-confirmation">
      <p>Are you sure you want to refresh the chat?</p>
      <button class="big-confirm-refresh">Yes</button>
      <button class="big-cancel-refresh">No</button>
    </div>
    <img class="mascot" src="future_panda_profile.png">
    <br>
    <label class="askQuestion" style="font-size:x-large;">Ask a question</label>
    <br>
    <div class="chats-container"></div>
    <textarea class="myInput" name="inputs" placeholder="Ask here..."></textarea>
    <div class="down-btn">↓</div>
 
    <div class="bot">
      
      <div class="bot-container">
        <div class="corner">⠿</div>
        <div class="bot-title">
          Rep4FinLit Budget Bot
          <div class="bot-refresh-btn">⟳</div>
        </div>
        <div class="bot-chat"></div>
        <div class="refresh-confirmation">
          <p>Are you sure you want to refresh the chat?</p>
          <button class="confirm-refresh">Yes</button>
          <button class="cancel-refresh">No</button>
        </div>
        <textarea class="bot-input" placeholder="Ask me anything!"></textarea>
        <div class="bot-down-btn">↓</div>
      </div>

      <div class="bot-btn">
        <img class="bot-img" src="future_panda_profile.png" alt="bot">
      </div>

    </div>
  </main>
  <script type="module" src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script> 

  </body>
</html>
